<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&B · 节奏蓝调音乐馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #f9eed9;
            color: #5c4836;
            display: flex;
            min-height: 100vh;
        }

        /* 左侧侧边栏  */
        .sidebar {
            width: 280px;
            background: #fff6e6;
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-logo {
            width: 130px;
            height: 130px;
            background: #c2a48a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .sidebar-title {
            font-size: 24px;
            margin-bottom: 40px;
            color: #6b5340;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
        }

        .nav-item {
            text-decoration: none;
            color: #6b5340;
            font-size: 17px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .nav-item:hover {
            color: #c2a48a;
        }

        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            padding: 60px 80px;
        }

        .page-header {
            margin-bottom: 70px;
        }

        .page-header p {
            font-size: 18px;
            color: #8c705b;
        }

        /* 分类板块 */
        .music-category {
            margin-bottom: 80px;
        }

        .cate-title {
            font-size: 28px;
            padding-left: 18px;
            border-left: 5px solid #c2a48a;
            margin-bottom: 35px;
            color: #5c4836;
        }

        /* 歌曲卡片容器 */
        .song-list {
            display: grid;
            grid-template-columns: repeat(3, 240px);
            gap: 35px;
        }

        /* 歌曲卡片 */
        .song-card {
            background: #fff6e6;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 6px 16px rgba(130, 106, 85, 0.12);
        }

        .song-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 28px rgba(130, 106, 85, 0.2);
        }

        /* 封面 */
        .song-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 16px;
        }

        .song-name {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .singer {
            font-size: 14px;
            color: #8c705b;
        }
    </style>
</head>
<body>
<!-- 左侧侧边栏 -->
<div class="sidebar">
    <div class="sidebar-logo">R&B</div>
    <div class="sidebar-title">节奏蓝调音乐馆</div>
    <div class="sidebar-nav">
        <a href="#european" class="nav-item">经典欧美R&B</a>
        <a href="#chinese" class="nav-item">华语新式蓝调</a>
        <a href="#independent" class="nav-item">宝藏独立单曲</a>
    </div>
</div>

<!-- 右侧主内容区 -->
<div class="main-content">
    <div class="page-header">
        <p>慵懒旋律 · 温柔唱腔 · 沉浸式聆听灵魂浪漫</p>
    </div>

    <!-- 经典欧美R&B  -->
    <div id="european" class="music-category">
        <h2 class="cate-title">经典欧美R&B</h2>
        <div class="song-list">
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=300&h=300&fit=crop">
                <div class="song-name">Blinding Lights</div>
                <div class="singer">The Weeknd</div>
            </div>
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=300&h=300&fit=crop">
                <div class="song-name">Take A Bow</div>
                <div class="singer">Rihanna</div>
            </div>
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1504898770365-14faca6a7320?w=300&h=300&fit=crop">
                <div class="song-name">Stay With Me</div>
                <div class="singer">Sam Smith</div>
            </div>
        </div>
    </div>

    <!-- 华语新式蓝调 -->
    <div id="chinese" class="music-category">
        <h2 class="cate-title">华语新式蓝调</h2>
        <div class="song-list">
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17?w=300&h=300&fit=crop">
                <div class="song-name">爱，存在</div>
                <div class="singer">魏奇奇</div>
            </div>
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=300&h=300&fit=crop">
                <div class="song-name">呼吸决定</div>
                <div class="singer">Fine乐团</div>
            </div>
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=300&h=300&fit=crop">
                <div class="song-name">慢慢喜欢你</div>
                <div class="singer">莫文蔚</div>
            </div>
        </div>
    </div>

    <!-- 宝藏独立单曲 -->
    <div id="independent" class="music-category">
        <h2 class="cate-title">宝藏独立单曲</h2>
        <div class="song-list">
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1524368535928-5b5e00ddc76b?w=300&h=300&fit=crop">
                <div class="song-name">Hrs & Hrs</div>
                <div class="singer">Muni Long</div>
            </div>
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=300&h=300&fit=crop">
                <div class="song-name">Die For You</div>
                <div class="singer">The Weeknd & Ariana</div>
            </div>
            <div class="song-card">
                <img class="song-cover" src="https://images.unsplash.com/photo-1485579149621-3123dd979885?w=300&h=300&fit=crop">
                <div class="song-name">Love On Top</div>
                <div class="singer">Beyoncé</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
